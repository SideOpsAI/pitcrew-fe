<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms Detection</title>
  </head>
  <body>
    <form
      name="pitcrew-contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="pitcrew-contact" />
      <input type="text" name="name" />
      <input type="text" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="plan" />
      <input type="text" name="vehicleType" />
      <input type="text" name="vehicle" />
      <input type="text" name="address" />
      <input type="text" name="cityState" />
      <input type="text" name="extraServices" />
      <input type="text" name="bookingTotalPrice" />
      <input type="text" name="callLink" />
      <input type="text" name="whatsAppLink" />
      <input type="text" name="serviceInterest" />
      <input type="text" name="message" />
      <input type="text" name="locale" />
      <input type="text" name="source" />
      <input type="text" name="notes" />
      <textarea name="bookingSummary"></textarea>
      <input type="file" name="vehiclePhotoFront" />
      <input type="file" name="vehiclePhotoSide" />
      <input type="file" name="vehiclePhotoExtra" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
